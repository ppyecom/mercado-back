services:
  - type: web
    name: laparada-backend
    env: node
    plan: free
    buildCommand: "npm ci && npm run build && npx prisma migrate deploy"
    startCommand: "npm run start"
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "8h"
      - key: CORS_ORIGIN
        sync: false
